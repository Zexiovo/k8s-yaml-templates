apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app: nginx
  name: nginx
spec:
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      nodeSelector:
        gpu: "true"
      containers:
      - image: registry.cn-beijing.aliyuncs.com/dotbalo/nginx:stable
        imagePullPolicy: IfNotPresent
        name: nginx
