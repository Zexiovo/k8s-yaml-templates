apiVersion: v1
kind: Service
metadata:
  name: demo-receive
  namespace: demo
  labels:
    app: demo-receive
  annotations:
    kubeasy.com/autoCreate: 'true'
spec:
  ports:
  - name: http-web
    protocol: TCP
    port: 8080
    targetPort: 8080
  selector:
    app: demo-receive
  sessionAffinity: None
