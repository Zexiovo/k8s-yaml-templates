apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: emptydir-memory
  name: emptydir-memory
spec:
  replicas: 2
  selector:
    matchLabels:
      app: emptydir-memory
  template:
    metadata:
      labels:
        app: emptydir-memory
    spec:
      containers:
      - image: registry.cn-beijing.aliyuncs.com/dotbalo/nginx:1.15.12
        name: nginx
        volumeMounts:
        - mountPath: /opt
          name: share-volume
      - image: registry.cn-beijing.aliyuncs.com/dotbalo/redis:7.2.5
        name: redis
        volumeMounts:
        - mountPath: /mnt
          name: share-volume
      volumes:
      - name: share-volume
        emptyDir:
          medium: Memory 
