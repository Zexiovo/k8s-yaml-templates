apiVersion: batch/v1
kind: CronJob
metadata:
  name: default-restart
  namespace: cronjob
spec:
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  concurrencyPolicy: Allow
  suspend: false
  jobTemplate:
    metadata:
      creationTimestamp: null
    spec:
      template:
        metadata:
          creationTimestamp: null
        spec:
          containers:
          - command:
            - sh
            - -c
            - |
              kubectl rollout restart deploy mysql -n default
            image: registry.cn-beijing.aliyuncs.com/dotbalo/kubectl:latest
            name: restart
            resources: {}
          restartPolicy: Never
  schedule: '01 18 * * 5'
  timeZone: "Asia/Shanghai"
status: {}
