apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello2
spec:
  failedJobsHistoryLimit: 5
  successfulJobsHistoryLimit: 5
    # concurrencyPolicy: Replace
  jobTemplate:
    metadata:
      name: hello2
    spec:
      template:
        metadata: {}
        spec:
          containers:
          - command:
            - sh
            - -c
            - echo Hello, Hello from the Kubernetes CronJob; sleep 10
            image: registry.cn-beijing.aliyuncs.com/dotbalo/busybox
            name: hello2
            resources: {}
          restartPolicy: OnFailure
  schedule: '49 19 * * *'
  timeZone: "Asia/Shanghai"
status: {}
